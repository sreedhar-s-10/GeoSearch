<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>GeoSearch | 3D Mystery Country Guessing Game</title>
    <meta name="title" content="GeoSearch | 3D Mystery Country Guessing Game">
    <meta name="description" content="Play GeoSearch, a free daily 3D geography game. Guess the mystery country using an interactive 3D globe. Like Wordle, but for world geography!">
    <meta name="keywords" content="geography game, mystery country game, worldle alternative, globle alternative, 3d globe game, educational geography, guess the country">
    <meta name="author" content="Your Name/Brand Here">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook (For link sharing previews) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-domain-here.com/">
    <meta property="og:title" content="GeoSearch | 3D Mystery Country Guessing Game">
    <meta property="og:description" content="Test your geography skills! Guess the mystery country using an interactive 3D globe. Red means hotter, Green means cooler. Can you find it?">
    <meta property="og:image" content="https://images.unsplash.com/photo-1544377193-33dcf4d68fb5?q=80&w=1200&auto=format&fit=crop"> <!-- Recommended: Replace with an actual screenshot of your game -->

    <!-- JSON-LD Schema for Google Rich Results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "GeoSearch",
      "description": "A 3D educational geography guessing game where players find a hidden mystery country on an interactive globe based on distance clues.",
      "genre": ["Educational", "Puzzle", "Geography"],
      "playMode": "SinglePlayer",
      "applicationCategory": "Game",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- External Libraries for 3D Globe -->
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020205; /* Deep space blue/black */
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        /* 3D Globe Canvas */
        #globeViz {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Loading Screen */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #020205;
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .spinner { font-size: 60px; animation: spin 2s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- UI Elements --- */
        .glass-panel {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 10;
            box-sizing: border-box;
        }

        /* Top Left: Title */
        #title-container {
            position: absolute;
            top: 25px;
            left: 25px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        h1 { margin: 0; font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px;}
        .subtitle { margin: 0; font-size: 13px; color: #b0b0b5; }
        
        .btn-giveup {
            background-color: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.5);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            width: fit-content;
        }
        .btn-giveup:hover { background-color: rgba(220, 53, 69, 0.4); color: white; }

        /* Bottom Center: Search Bar */
        #search-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            padding: 15px;
            display: flex;
            gap: 12px;
        }
        input {
            flex-grow: 1;
            padding: 16px 20px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #4facfe; box-shadow: 0 0 15px rgba(79, 172, 254, 0.3); }
        .btn-guess {
            padding: 0 24px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-guess:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }
        .btn-guess:active { transform: translateY(0); }

        /* Top Right: History Panel */
        #history-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 340px;
            max-height: calc(100vh - 140px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            color: #ccc;
        }
        .sort-buttons button {
            background-color: transparent;
            color: #aaa;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sort-buttons button.active { background-color: #4facfe; color: #000; border-color: #4facfe; font-weight: bold; }

        /* Guess List & Scrollbar */
        .guess-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 5px;
            flex-grow: 1;
        }
        .guess-list::-webkit-scrollbar { width: 6px; }
        .guess-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .guess-item {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 14px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }
        .guess-item:hover { transform: translateX(-5px); }

        /* Enhanced Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: linear-gradient(180deg, #1a1a24 0%, #0d0d14 100%);
            padding: 40px 50px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            max-width: 450px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-content h2 { margin-top: 0; font-size: 28px; }
        .modal-content h1 { justify-content: center; font-size: 42px; margin: 15px 0; background: -webkit-linear-gradient(#fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .modal-btn {
            margin-top: 25px;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #000;
            transition: transform 0.2s;
        }
        .modal-btn:hover { transform: scale(1.05); }

        /* Responsive Layout for Mobile */
        @media (max-width: 900px) {
            #title-container { position: relative; top: 0; left: 0; width: 100%; border-radius: 0; border-left: none; border-right: none; border-top: none; }
            #history-panel { top: auto; bottom: 120px; left: 50%; transform: translateX(-50%); width: 90%; max-height: 35vh; right: auto;}
            #search-container { bottom: 20px; }
            .btn-giveup { position: absolute; right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

    <!-- Semantic Tagging for Screen Readers -->
    <main>
        <div id="loading-overlay" aria-live="polite">
            <div class="spinner" aria-hidden="true">🌍</div>
            <h2 style="margin:0; font-family: 'Inter', sans-serif;">Initializing Orbit...</h2>
            <p style="color: #888;">Fetching telemetry data</p>
        </div>

        <!-- The 3D Canvas -->
        <div id="globeViz" aria-label="Interactive 3D representation of the Earth"></div>

        <!-- Top Left: Title & Actions -->
        <header id="title-container" class="glass-panel" style="display: none;">
            <h1>🌍 GeoSearch</h1>
            <p class="subtitle">Find the mystery country.</p>
            <button class="btn-giveup" onclick="giveUp()" aria-label="Give up and reveal the mystery country">🏳️ Give Up</button>
        </header>

        <!-- Top Right: Guesses History -->
        <section id="history-panel" class="glass-panel" style="display: none;" aria-label="Guess History">
            <div class="controls">
                <span>Guesses: <strong id="guess-count" style="color: #fff; font-size: 16px;">0</strong></span>
                <div class="sort-buttons" aria-label="Sort guesses by">
                    <button id="btn-order" class="active" onclick="setSort('order')" aria-label="Sort by time">Time</button>
                    <button id="btn-distance" onclick="setSort('distance')" aria-label="Sort by distance">Distance</button>
                </div>
            </div>
            <div class="guess-list" id="guesses-container" aria-live="polite">
                <!-- Guesses populate here -->
                <div style="text-align: center; color: #666; margin-top: 20px; font-size: 14px;">Your guesses will appear here.</div>
            </div>
        </section>

        <!-- Bottom Center: Search Input -->
        <section id="search-container" class="glass-panel" style="display: none;" aria-label="Search and Guess">
            <input type="text" id="country-input" list="country-list" placeholder="Enter country name..." autocomplete="off" aria-label="Type a country name to guess">
            <datalist id="country-list"></datalist>
            <button class="btn-guess" onclick="makeGuess()" aria-label="Submit your country guess">Scan</button>
        </section>

        <!-- Victory / Game Over Modal -->
        <dialog id="victory-modal" class="modal" aria-labelledby="modal-title" aria-describedby="winning-country">
            <div class="modal-content">
                <h2 id="modal-title">🎉 You Found It! 🎉</h2>
                <p id="modal-subtitle" style="color: #aaa; margin-bottom: 5px;">The mystery country was:</p>
                <h1 id="winning-country"></h1>
                <p id="modal-stats">It took you <strong id="final-guess-count" style="color: #fff;"></strong> guesses.</p>
                <button class="modal-btn" onclick="location.reload()" aria-label="Play a new game">Play Again</button>
            </div>
        </dialog>
    </main>

    <script>
        // --- Game Variables ---
        let geoJsonData = null;
        let restCountriesData = {};
        let mysteryCountryCode = null;
        let guesses = [];
        let sortMethod = 'order'; 
        let gameOver = false;

        // --- Common Abbreviations & Aliases Map ---
        const aliases = {
            "usa": "USA", "us": "USA", "united states": "USA", "united states of america": "USA", "america": "USA",
            "uk": "GBR", "gb": "GBR", "united kingdom": "GBR", "great britain": "GBR", "england": "GBR",
            "uae": "ARE", "united arab emirates": "ARE", "emirates": "ARE",
            "russia": "RUS", "russian federation": "RUS",
            "china": "CHN", "prc": "CHN", "peoples republic of china": "CHN",
            "south korea": "KOR", "korea": "KOR", "republic of korea": "KOR",
            "north korea": "PRK", "dprk": "PRK",
            "drc": "COD", "dr congo": "COD", "democratic republic of the congo": "COD",
            "car": "CAF", "central african republic": "CAF",
            "saudi": "SAU", "saudi arabia": "SAU",
            "south africa": "ZAF", "rsa": "ZAF"
        };

        // --- Initialize 3D Globe with attractive Blue Marble texture ---
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
            .polygonSideColor(() => 'rgba(0, 0, 0, 0.4)')
            .polygonStrokeColor(() => '#111');

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;

        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(window.innerHeight);
        });

        document.getElementById('globeViz').addEventListener('mousedown', () => {
            world.controls().autoRotate = false;
        });

        // --- Fetch Data & Start Game ---
        Promise.all([
            fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson').then(r => r.json()),
            fetch('https://restcountries.com/v3.1/all?fields=name,cca3,latlng,borders').then(r => r.json())
        ]).then(([geoData, restData]) => {
            
            restData.forEach(c => { restCountriesData[c.cca3] = c; });

            geoData.features = geoData.features.filter(d => {
                const code = d.properties.ISO_A3;
                return code !== 'ATA' && code !== '-99' && restCountriesData[code];
            });
            geoJsonData = geoData;

            world.polygonsData(geoData.features)
                 .polygonCapColor(() => 'rgba(255, 255, 255, 0.0)') 
                 .polygonAltitude(0.01);

            const dataList = document.getElementById('country-list');
            Object.values(restCountriesData)
                .sort((a,b) => a.name.common.localeCompare(b.name.common))
                .forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.name.common;
                    dataList.appendChild(option);
                });

            const randomFeat = geoData.features[Math.floor(Math.random() * geoData.features.length)];
            mysteryCountryCode = randomFeat.properties.ISO_A3;

            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('title-container').style.display = 'flex';
                document.getElementById('history-panel').style.display = 'flex';
                document.getElementById('search-container').style.display = 'flex';
            }, 500);
        });

        // --- Distance Logic (Haversine) ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }

        function getDistanceColor(distance) {
            if (distance === 0) return '#ff3333'; 
            if (distance < 1500) return '#ff6b33'; 
            if (distance < 3500) return '#ffa600'; 
            if (distance < 6000) return '#ffd000'; 
            if (distance < 9000) return '#a2ff00'; 
            return '#00e676'; 
        }

        // --- Main Guessing Function ---
        function makeGuess() {
            if (gameOver) return;
            const inputField = document.getElementById('country-input');
            const rawInput = inputField.value;
            const cleanedInput = rawInput.toLowerCase().replace(/[.,\-']/g, "").trim();
            if (!cleanedInput) return;

            let guessedCode = null;

            if (aliases[cleanedInput]) {
                guessedCode = aliases[cleanedInput];
            } else {
                for (const code in restCountriesData) {
                    const c = restCountriesData[code];
                    const common = c.name.common.toLowerCase().replace(/[.,\-']/g, "");
                    const official = c.name.official ? c.name.official.toLowerCase().replace(/[.,\-']/g, "") : "";
                    
                    if (common === cleanedInput || official === cleanedInput || code.toLowerCase() === cleanedInput) {
                        guessedCode = code;
                        break;
                    }
                }
            }

            if (!guessedCode || !restCountriesData[guessedCode]) {
                alert("Location not recognized. Please check spelling.");
                return;
            }

            if (guesses.some(g => g.code === guessedCode)) {
                alert("Coordinates already scanned!");
                return;
            }

            const guessedData = restCountriesData[guessedCode];
            const mysteryData = restCountriesData[mysteryCountryCode];

            let distance = 0;
            let isWin = false;

            if (guessedCode === mysteryCountryCode) {
                distance = 0;
                isWin = true;
            } else if (mysteryData.borders && mysteryData.borders.includes(guessedCode)) {
                distance = 0; 
            } else {
                distance = calculateDistance(guessedData.latlng[0], guessedData.latlng[1], mysteryData.latlng[0], mysteryData.latlng[1]);
            }

            let trendText = "";
            let trendColor = "#aaa";
            if (guesses.length > 0) {
                const prevDist = guesses[0].distance; 
                if (isWin) { trendText = "Target Acquired!"; trendColor = "#4facfe"; }
                else if (distance < prevDist) { trendText = "Getting Hotter 🔥"; trendColor = "#ff6b33"; }
                else if (distance > prevDist) { trendText = "Getting Cooler ❄️"; trendColor = "#00e676"; }
                else { trendText = "Same Distance ↔️"; }
            } else {
                if (isWin) { trendText = "First Try?!"; trendColor = "#4facfe"; }
                else { trendText = "Initial Scan"; }
            }

            guesses.unshift({
                order: guesses.length + 1,
                code: guessedCode,
                name: guessedData.name.common,
                distance: distance,
                trend: trendText,
                trendColor: trendColor,
                isWin: isWin
            });

            inputField.value = '';
            
            renderGuesses();
            updateGlobe();
            
            world.controls().autoRotate = false;
            world.pointOfView({ lat: guessedData.latlng[0], lng: guessedData.latlng[1], altitude: 1.5 }, 1200);

            if (isWin) {
                gameOver = true;
                setTimeout(() => showEndScreen(guessedData.name.common, true), 1500);
            }
        }

        // --- Give Up Function ---
        function giveUp() {
            if (gameOver) return;
            gameOver = true;
            const mysteryData = restCountriesData[mysteryCountryCode];
            
            world.polygonCapColor(feat => {
                if(feat.properties.ISO_A3 === mysteryCountryCode) return 'rgba(255, 0, 0, 0.6)';
                return 'rgba(255, 255, 255, 0.0)';
            }).polygonAltitude(feat => feat.properties.ISO_A3 === mysteryCountryCode ? 0.05 : 0.01);

            world.controls().autoRotate = false;
            world.pointOfView({ lat: mysteryData.latlng[0], lng: mysteryData.latlng[1], altitude: 1.5 }, 1200);

            setTimeout(() => showEndScreen(mysteryData.name.common, false), 1500);
        }

        // --- UI Updates ---
        function renderGuesses() {
            const container = document.getElementById('guesses-container');
            container.innerHTML = '';
            document.getElementById('guess-count').innerText = guesses.length;

            let displayGuesses = [...guesses];
            if (sortMethod === 'distance') {
                displayGuesses.sort((a, b) => a.distance - b.distance);
            }

            displayGuesses.forEach(g => {
                const div = document.createElement('div');
                div.className = 'guess-item';
                const color = g.isWin ? '#4facfe' : getDistanceColor(g.distance);
                div.style.borderLeft = `5px solid ${color}`;
                
                div.innerHTML = `
                    <div style="display:flex; justify-content: space-between; align-items: center;">
                        <strong style="font-size: 15px;">${g.order}. ${g.name}</strong>
                        <span style="color: ${color}; font-weight:800; font-size: 15px;">${g.isWin ? '🎯 WIN' : g.distance.toLocaleString() + ' km'}</span>
                    </div>
                    <div style="font-size: 12px; color: ${g.trendColor}; font-weight: 600; margin-top: 2px;">${g.trend}</div>
                `;
                container.appendChild(div);
            });
        }

        function updateGlobe() {
            world.polygonCapColor(feat => {
                const code = feat.properties.ISO_A3;
                const guess = guesses.find(g => g.code === code);
                
                if (!guess) return 'rgba(255, 255, 255, 0.0)';
                if (guess.isWin) return 'rgba(79, 172, 254, 0.7)'; 
                
                const hex = getDistanceColor(guess.distance);
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, 0.6)`;
            })
            .polygonAltitude(feat => {
                const code = feat.properties.ISO_A3;
                return guesses.some(g => g.code === code) ? 0.06 : 0.01;
            });
        }

        function setSort(method) {
            sortMethod = method;
            document.getElementById('btn-order').classList.remove('active');
            document.getElementById('btn-distance').classList.remove('active');
            document.getElementById(`btn-${method}`).classList.add('active');
            renderGuesses();
        }

        function showEndScreen(countryName, isWin) {
            document.getElementById('winning-country').innerText = countryName;
            
            if (!isWin) {
                document.getElementById('modal-title').innerText = "Game Over!";
                document.getElementById('modal-title').style.color = "#ff6b6b";
                document.getElementById('winning-country').style.background = "-webkit-linear-gradient(#ff6b6b, #ff0000)";
                document.getElementById('winning-country').style.webkitBackgroundClip = "text";
                document.getElementById('winning-country').style.webkitTextFillColor = "transparent";
                document.getElementById('modal-stats').innerHTML = `You gave up after <strong style="color: #fff;">${guesses.length}</strong> guesses.`;
            } else {
                document.getElementById('final-guess-count').innerText = guesses.length;
            }

            document.getElementById('victory-modal').style.display = 'flex';
        }

        document.getElementById('country-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') makeGuess();
        });
    </script>
</body>
</html>
